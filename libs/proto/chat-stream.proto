syntax = "proto3";

package chatstream;

service ChatStream {
  rpc StreamChatResponse (stream ChatResponseChunk) returns (StreamResponseAck);
}

message ChatResponseChunk {
  string correlation_id = 1;
  string conversation_id = 2;
  string content = 3;
  bool done = 4;
  repeated SourceRef sources = 5;
  optional double confidence_score = 6;
  optional int32 revision = 7;
  repeated EvidenceRef evidence = 8;
  repeated ClaimRef claims = 9;
  optional string rendered_answer = 10;
  repeated string citation_warnings = 11;
}

message SourceRef {
  string file_id = 1;
  string file_name = 2;
  int32 chunk_index = 3;
  double score = 4;
  optional string excerpt = 5;
  optional int32 page_number = 6;
  optional string citation_content = 7;
}

message StreamResponseAck {
  bool received = 1;
}

message EvidenceRef {
  string evidence_id = 1;
  string file_id = 2;
  string file_name = 3;
  int32 chunk_index = 4;
  double score = 5;
  optional string excerpt = 6;
  optional int32 page_number = 7;
  optional string citation_content = 8;
}

message ClaimRef {
  string claim_text = 1;
  repeated string evidence_ids = 2;
}
