services:
  postgres-test:
    image: postgres:16-alpine
    ports:
      - '5434:5432'
    environment:
      POSTGRES_DB: files_assistant_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 3s
      timeout: 3s
      retries: 10

  redpanda-test:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --memory 256M
      - --overprovisioned
      - --node-id 0
      - --check=false
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda-test:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda-test:8082,external://localhost:18082
    ports:
      - '19092:19092'
      - '18082:18082'
    volumes:
      - redpanda_test_data:/var/lib/redpanda/data
    healthcheck:
      test: ['CMD', 'rpk', 'cluster', 'health']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  redpanda_test_data:
